<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="music-player">
            <div class="player-header">
                <h1>Music Player</h1>
                <p class="subtitle">Your favorite music, anytime</p>
            </div>
            
            <div class="player-display">
                <div class="album-art">
                    <img id="albumArt" src="https://via.placeholder.com/300" alt="Album Art">
                </div>
                <div class="track-info">
                    <h2 id="trackName">Song Title</h2>
                    <p id="artistName">Artist Name</p>
                </div>
            </div>
            
            <div class="player-progress">
                <span id="currentTime">0:00</span>
                <div class="progress-bar">
                    <div id="progress" class="progress-fill"></div>
                </div>
                <span id="duration">0:00</span>
            </div>
            
            <div class="player-controls">
                <button id="prevBtn" class="control-btn">⬅️</button>
                <button id="playBtn" class="control-btn play-btn">▶️</button>
                <button id="nextBtn" class="control-btn">➡️</button>
                <button id="shuffleBtn" class="control-btn">🔀</button>
                <button id="repeatBtn" class="control-btn">🔁</button>
            </div>
            
            <div class="volume-control">
                <span>🔈</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
                <span>🔊</span>
            </div>
            
            <div class="playlist">
                <h3>Playlist</h3>
                <ul id="playlistItems">
                    <li class="playlist-item active">Track 1 - Artist A</li>
                    <li class="playlist-item">Track 2 - Artist B</li>
                    <li class="playlist-item">Track 3 - Artist C</li>
                    <li class="playlist-item">Track 4 - Artist D</li>
                    <li class="playlist-item">Track 5 - Artist E</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
